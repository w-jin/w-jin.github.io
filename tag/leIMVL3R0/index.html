          &lt;h2 id=&#34;定义&#34;&gt;定义&lt;/h2&gt;
&lt;p&gt;红黑树是一种自平衡的二叉搜索树，除满足二叉搜索树的要求外，还满足&lt;br&gt;
1、节点是黑色或者红色的；&lt;br&gt;
2、根节点是黑色的；&lt;br&gt;
3、叶子节点是黑色的；&lt;br&gt;
4、每个红色节点有两个黑色的孩子节点；&lt;br&gt;
5、从任意一个节点出发，到达其叶子节点的路径上黑色节点个数相同。&lt;/p&gt;
&lt;p&gt;这些约束保证了红黑树的关键特性：从根节点出发到叶子节点的最长可能路径不超过最短可能路径的两倍长，所以红黑树大致是平衡的。这是因为4保证相邻的两个节点一定不都是红色的，而5保证最短的可能路径上必定全是黑色节点，而最长可能路径上必是红黑相间，且两者黑色节点个数相等，所以最长可能路径的长度最多为最短可能路径长度的2倍。&lt;/p&gt;
&lt;p&gt;下图所示是一棵典型的红黑树，此处叶子节点不保存数据，所以省略了所有叶子节点。在二叉树中，一个节点可能只有一个子节点，而叶子保存数据，这样也可以实现红黑树，但算法比较复杂。因此本文中所有叶子节点都不保存数据，省略不画，实现中不为它分配内存，即使用nullptr表示叶子节点，而不是使用左右孩子都为nullptr指针的节点表示叶子节点。这样，一个显而易见的结论是所有节点都有两个子节点，不过其中的一个或两个为空。为方便起见，本文称呼nullptr为空节点，及称呼左右孩子都为nullptr的节点为叶子节点。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/example.png&#34; alt=&#34;example&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;红黑树的节点定义为&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;struct RBNode {
    enum Color {
        RED, BLACK
    };

    int value;
    Color color;
    RBNode *left;
    RBNode *right;
    RBNode *parent;

    explicit RBNode(int value = 0) : value(value), color(RED),
            left(nullptr), right(nullptr), parent(nullptr) {}
};
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;为方便后续代码的表达，此处再定义一组返回周围节点的操作：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;struct RBNode {
    enum Color {
        RED, BLACK
    };

    int value;
    Color color;
    RBNode *left;
    RBNode *right;
    RBNode *parent;

    explicit RBNode(int value = 0) : value(value), color(RED),
            left(nullptr), right(nullptr), parent(nullptr) {}

    // 返回父节点的父节点
    RBNode *grandparent() const {
        if (!parent)
            return nullptr;
        return parent-&amp;gt;parent;
    }

    // 返回父节点的兄弟
    RBNode *uncle() const {
        if (!grandparent())
            return nullptr;
        if (parent == grandparent()-&amp;gt;right)
            return grandparent()-&amp;gt;left;
        else
            return grandparent()-&amp;gt;right;
    }

    // 返回自己的兄弟
    RBNode *sibling() const {
        if (!parent)
            return nullptr;
        if (parent-&amp;gt;left == this)
            return parent-&amp;gt;right;
        else
            return parent-&amp;gt;left;
    }
};
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;插入节点&#34;&gt;插入节点&lt;/h2&gt;
&lt;p&gt;首先我们以二叉搜索树插入节点的方法(参考平衡二叉树的插入一节)来插入一个节点并标记它为红色。之所以标记为红色是因为如果标记为黑色，则此路径上多了一个黑色节点，这一点难以调整，而标记为红色只可能导致连续出现两个红色节点的冲突，可以通过旋转和染色来解决。&lt;/p&gt;
&lt;p&gt;在下面的示意图中，将要调整的节点(初始为刚插入的节点，可能向上递归)标记为N，N的父节点为P，N的祖父节点标记为G，N的叔父节点标记为U。红黑树插入节点分为以下几种情况：&lt;br&gt;
1、要调整的节点N为树的根节点，没有父节点。将它重绘为黑色即可。&lt;br&gt;
2、要调整的节点的父节点P为黑色，此时未破坏红黑树的性质，什么也不用做；&lt;br&gt;
3、要调整的节点的父节点P和叔父节点U都为红色，此时祖父节点G必为黑色。调整方法为将P和U重绘为黑色，G重绘为红色，这样通过G的任意一条路径的黑色节点个数和原来一样，但如果G是根节点则违反性质2，或者如果G的父节点是红色则违反性质4。因此需要再调整节点G。示意图如下(实际情况中，N可能为P的右孩子，P也可能为G的右孩子)：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/insert3.png&#34; alt=&#34;insert3&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;4、要调整的节点的父节点P为红色而叔父节点U不存在或者为黑色，且N为P的左孩子，而P为G的左孩子，或者与此对称地，N为P的右孩子，而p为G的右孩子。此时祖父节点G必为黑色节点，将G重绘为红色节点，将P重绘为黑色节点，然后右旋节点G，或者与此对称地，左旋节点G。示意图如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/insert4.png&#34; alt=&#34;insert4&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;如果N是新插入的节点，则P到nullptr的路径上只有一个黑色节点(nullptr本身)，所以P的右子树必为空，U必为nullptr。但如果是第3种情况向上递归时遇到的第5种情况则不一定了，此时N可能有子树，所以P也可能有右子树，而U不为空，即上图所画的情况。&lt;br&gt;
5、要调整的节点的父节点P为红色而叔父节点U不存在或者为黑色，且N为P的右孩子，而P为G的左孩子，或者与此对称地，N为P的左孩子，而P为G的右孩子。前者左旋节点P，后者右旋节点P，然后按第4种情况调整节点P。示意图如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;4&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/insert5.png&#34; alt=&#34;insert5&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;如果N是新插入的节点，则P到nullptr的路径上只有一个黑色节点(nullptr本身)，因此P的左子树必为空，U必为nullptr。但是如果是第3种情况向上递归时遇到的第5种情况则不一定了，此时N可能有子树，即上图所画的情况。&lt;/p&gt;
&lt;p&gt;代码描述为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 插入数据。如果data已存在，则什么也不做。
void RBTree::insert(int data) {
    // 空树插入为根节点，并绘制为黑色
    if (!rb_root) {
        rb_root = new RBNode(data);
        rb_root-&amp;gt;color = RBNode::BLACK;
        return;
    }

    RBNode *p = rb_root;
    while (true) {
        if (data == p-&amp;gt;value)  // 值已经存在什么也不做
            return;
        else if (data &amp;lt; p-&amp;gt;value) {
            if (p-&amp;gt;left) {
                p = p-&amp;gt;left;
            } else {
                p-&amp;gt;left = new RBNode(data);
                p-&amp;gt;left-&amp;gt;parent = p;
                return insertionAdjust(p-&amp;gt;left);
            }
        } else {
            if (p-&amp;gt;right) {
                p = p-&amp;gt;right;
            } else {
                p-&amp;gt;right = new RBNode(data);
                p-&amp;gt;right-&amp;gt;parent = p;
                return insertionAdjust(p-&amp;gt;right);
            }
        }
    }
}

void RBTree::insertionAdjust(RBNode *p) {
    if (!p-&amp;gt;parent) {  // 要调整的节点是根节点，重绘成黑色即可
        rb_root = p;
        rb_root-&amp;gt;color = RBNode::BLACK;
        return;
    } else if (p-&amp;gt;parent-&amp;gt;color == RBNode::RED) {
        // 父节点为黑色时什么也不用做，只考虑父节点为红色的情况，此时父节点不可能
        // 是根节点，即祖父节点必然存在
        if (p-&amp;gt;uncle() &amp;amp;&amp;amp; p-&amp;gt;uncle()-&amp;gt;color == RBNode::RED) {
            // 叔父节点存在且为红色，将父节点和叔父节点重绘为黑色，祖父节点重绘为
            // 红色，然后递归处理祖父节点
            p-&amp;gt;parent-&amp;gt;color = RBNode::BLACK;
            p-&amp;gt;uncle()-&amp;gt;color = RBNode::BLACK;
            p-&amp;gt;grandparent()-&amp;gt;color = RBNode::RED;
            insertionAdjust(p-&amp;gt;grandparent());
        } else { // 叔父节点不存在或者为黑色
            if (p == p-&amp;gt;parent-&amp;gt;left &amp;amp;&amp;amp; p-&amp;gt;parent == p-&amp;gt;grandparent()-&amp;gt;left) {
                p-&amp;gt;parent-&amp;gt;color = RBNode::BLACK;
                p-&amp;gt;grandparent()-&amp;gt;color = RBNode::RED;
                rightRotate(p-&amp;gt;grandparent());
            } else if (p == p-&amp;gt;parent-&amp;gt;right &amp;amp;&amp;amp; p-&amp;gt;parent == p-&amp;gt;grandparent()-&amp;gt;right) {
                p-&amp;gt;parent-&amp;gt;color = RBNode::BLACK;
                p-&amp;gt;grandparent()-&amp;gt;color = RBNode::RED;
                leftRotate(p-&amp;gt;grandparent());
            } else if (p == p-&amp;gt;parent-&amp;gt;right &amp;amp;&amp;amp; p-&amp;gt;parent == p-&amp;gt;grandparent()-&amp;gt;left) {
                leftRotate(p-&amp;gt;parent);
                p-&amp;gt;color = RBNode::BLACK;
                p-&amp;gt;parent-&amp;gt;color = RBNode::RED;
                rightRotate(p-&amp;gt;parent);
            } else { // p == p-&amp;gt;parent-&amp;gt;left &amp;amp;&amp;amp; p-&amp;gt;parent == p-&amp;gt;grandparent()-&amp;gt;right
                rightRotate(p-&amp;gt;parent);
                p-&amp;gt;color = RBNode::BLACK;
                p-&amp;gt;parent-&amp;gt;color = RBNode::RED;
                leftRotate(p-&amp;gt;parent);
            }
        }
    }
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;要注意insertionAdjust函数中，也不能少了判断p为根节点的情况，表面上这种情况在insert函数中已经单独处理了，但由第3种递归处理时也可能得到这种情况。&lt;/p&gt;
&lt;h2 id=&#34;删除节点&#34;&gt;删除节点&lt;/h2&gt;
&lt;p&gt;首先参考二叉搜索树删除节点的方法，如果待删除的节点有两个孩子，则从右子树中选择具有最小值的节点，即后继节点，交换它们的值，然后删除后继节点。由于后继节点必为叶子节点或者只有右孩子，所以删除节点的问题只需要考虑删除最多只有一个孩子的节点的问题，以下仅考虑这一种情况。&lt;/p&gt;
&lt;p&gt;首先看三种基本情况：&lt;/p&gt;
&lt;p&gt;1、如果待删除节点为红色，删除它后不会影响红黑树的性质，直接删除即可。&lt;/p&gt;
&lt;p&gt;2、如果待删除节点为黑色，但它有一个红色的孩子节点，则以此节点代替它并重绘为黑色即可。&lt;/p&gt;
&lt;p&gt;3、如果待删除节点为黑色，且孩子节点是黑色节点。由于它最多只有一个孩子节点，如果这个孩子节点存在且为黑色，则此路径比另一路径多一个黑色节点，所以待删除节点必定没有孩子节点。但这种情况只会出现在删除某个节点第一次调用调整函数时，由于调整函数有递归，递归时情况可能会变复杂，此时不去考虑被调整节点的孩子即可。&lt;/p&gt;
&lt;p&gt;这三种基本情况中，第3种比较复杂，后面再讨论，先考虑第1、2两种情况，代码描述如下：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 删除节点
void RBTree::erase(RBNode *node) {
    if (!node)   // 空指针什么也不做
        return;

    // node既有左孩子又有右孩子，从右子树中选择最小的节点，交换它和node的值，
    // 然后删除它
    if (node-&amp;gt;left &amp;amp;&amp;amp; node-&amp;gt;right) {
        RBNode *p = node-&amp;gt;right;
        while (p-&amp;gt;left)
            p = p-&amp;gt;left;
        node-&amp;gt;value = p-&amp;gt;value;   // 如果不是内置类型考虑使用移动语义
        node = p;
    }

    // node至多只有一个孩子，根据周围的节点情况调整。几种使用孩子节点替换的情况不在
    // erasionAdjust中，必须单独考虑
    RBNode *parent = node-&amp;gt;parent;
    if (RBNode::RED == node-&amp;gt;color) {
        // 红色节点直接删除，其它什么也不做
    } else if (node-&amp;gt;left &amp;amp;&amp;amp; RBNode::RED == node-&amp;gt;left-&amp;gt;color) {
        // 待删除节点为黑色，左孩子存在且为红色。以左孩子替代它并重绘为黑色
        node-&amp;gt;left-&amp;gt;color = RBNode::BLACK;
    } else if (node-&amp;gt;right &amp;amp;&amp;amp; RBNode::RED == node-&amp;gt;right-&amp;gt;color) {
        // 待删除节点为黑色，右孩子存在且为红色。以右孩子替代它并重绘为黑色
        node-&amp;gt;right-&amp;gt;color = RBNode::BLACK;
    } else {
        erasionAdjust(node);   // 第3种基本情况
    }

    // 把node从红黑树中摘下来并删除
    if (!parent) {
        if (node-&amp;gt;left)
            rb_root = node-&amp;gt;left;
        else
            rb_root = node-&amp;gt;right;
    } else {
        if (node == parent-&amp;gt;left) {
            if (node-&amp;gt;left)
                parent-&amp;gt;left = node-&amp;gt;left;
            else
                parent-&amp;gt;left = node-&amp;gt;right;
        } else {
            if (node-&amp;gt;left)
                parent-&amp;gt;right = node-&amp;gt;left;
            else
                parent-&amp;gt;right = node-&amp;gt;right;
        }
    }
    node-&amp;gt;left = nullptr;
    node-&amp;gt;right = nullptr;
    delete node;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;现在来考虑第3种基本情况，由于存在递归，递归过程中的待调整节点不是待删除节点，因此以待调整节点来称呼即将被删除的节点。记待调整节点为D，其父节点为P，兄弟节点为S，兄弟节点的两个子树为Sl和Sr。&lt;/p&gt;
&lt;p&gt;根据待调整节点D周围的情况，可以分为以下6种情况：&lt;/p&gt;
&lt;p&gt;1、待调整节点为根节点。如果随后要删除这个节点，则整棵树只有这一个节点，删除之后为空树；如果随后不删除这个节点，则必然是由情况6递归而来，此时这个节点已经是黑色，不用做任何调整。因此这种情况直接返回即可。&lt;/p&gt;
&lt;p&gt;待调整节点不为根节点时，其父节点存在，由于待调整节点为黑色，因此其兄弟节点必定存在，否则待调整节点所在路径多一个黑色节点。&lt;/p&gt;
&lt;p&gt;2、兄弟节点为红色，此时父节点必为黑色。交换P和S的颜色，然后对P做左旋，此时D的兄弟节点变成黑色，为3、4、5三种情况中的任意一种(Sl为子树，其根节点为黑色但可能还有红色子节点，因此不一定为情况5)，接着处理即可。示意图如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;5&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase2.1.png&#34; alt=&#34;erase2.1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;6&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase2.2.png&#34; alt=&#34;erase2.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;3、兄弟节点为黑色，远侄子节点存在且为红色，此时父节点可黑可红，而近侄子节点可空可红。交换P和S的颜色，然后对P左旋，把远侄子重绘为黑色，调整即完成，随后即可删除节点D。示意图如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;7&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase3.1.png&#34; alt=&#34;erase3.1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;8&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase3.2.png&#34; alt=&#34;erase3.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;4、兄弟节点为黑色，远侄子节点不存在或者为黑色，近侄子节点为红色。此时父节点可黑可红，如果D是待删除节点，将在调整完成后删除，则远侄子节点必定不存在，否则从P出发经过它的两个孩子的路径长度不一致。但如果是从情况6递归而来，则远侄子节点可能存在且为黑色，此时近侄子变有黑色孩子(图中未画出，旋转时某一个孩子由S收养)。调整方法为旋转节点S，并交换近侄子和S的颜色，然后按情况3调整近侄子节点。当D在左子树时，右旋S，当D在右子树时，左旋S。示意图如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;9&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase4.1.png&#34; alt=&#34;erase4.1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;10&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase4.2.png&#34; alt=&#34;erase4.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;5、兄弟节点为黑色，侄子节点都不存在或者为黑色，父节点为红色。如果D是待删除节点，将在调整完成后删除，则兄弟节点必为叶子节点，但如果是从情况6递归而来，则侄子节点可能存在并为黑色。调整方法为将P重绘为黑色，S重绘为红色，调整即完成，随后可删除节点D。示意图如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;11&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase5.1.png&#34; alt=&#34;erase5.1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;12&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase5.2.png&#34; alt=&#34;erase5.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;6、兄弟节点为黑色，侄子节点不存在或者为黑色，父节点为黑色。调整方法为将S重绘为红色，这样删除D后经过P的路径黑色节点个数减少1，因此必须继续调整节点P。在继续调整节点P时，由于之后不会删除P，因此以孩子节点顶替待调整节点的情况不能考虑在内，也就是递归调整只在基本情况3内递归，这是把基本情况的1和2单独列出来的原因。示意图如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;13&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase6.1.png&#34; alt=&#34;erase6.1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;14&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/rbtree/erase6.2.png&#34; alt=&#34;erase6.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;综合以上6种情况，可得到基本情况3的处理方法，代码描述为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;void RBTree::erasionAdjust(RBNode *node) {
    // 黑色节点可能为根节点
    if (node == rb_root)
        return;

    // 待删除节点不为根节点，则兄弟节点必然存在
    RBNode *parent = node-&amp;gt;parent;
    RBNode *sibling = node-&amp;gt;sibling();

    if (RBNode::RED == sibling-&amp;gt;color) {
        // 兄弟节点为红色，此时父节点必为黑色。旋转父节点，交换父节点和兄弟节点
        // 的颜色，然后按其它情况处理。
        parent-&amp;gt;color = RBNode::RED;
        sibling-&amp;gt;color = RBNode::BLACK;

        if (node == parent-&amp;gt;left)
            leftRotate(parent);
        else
            rightRotate(parent);

        // 旋转后兄弟节点变成了sibling的孩子，此节点和sibling的另一个孩子必存在
        // 且为黑色
        sibling = node-&amp;gt;sibling();
    }

    // sibling-&amp;gt;color == RBNode::BLACK必然成立，即兄弟节点必为黑色
    if (node == parent-&amp;gt;left &amp;amp;&amp;amp;
        sibling-&amp;gt;right &amp;amp;&amp;amp; RBNode::RED == sibling-&amp;gt;right-&amp;gt;color) {
        // 待删除节点位于左子树，远侄子节点存在且为红色。此时父节点颜色不定，可黑可红。
        // 交换父节点和兄弟节点颜色，父节点左旋，远侄子重绘为黑色
        sibling-&amp;gt;color = parent-&amp;gt;color;
        parent-&amp;gt;color = RBNode::BLACK;
        sibling-&amp;gt;right-&amp;gt;color = RBNode::BLACK;
        leftRotate(parent);
    } else if (node == parent-&amp;gt;right &amp;amp;&amp;amp;
               sibling-&amp;gt;left &amp;amp;&amp;amp; RBNode::RED == sibling-&amp;gt;left-&amp;gt;color) {
        // 待删除节点位于右子树，远侄子节点存在且为红色。此时父节点颜色不定，可黑可红。
        // 交换父节点和兄弟节点的颜色，父节点右旋，远侄子重绘为黑色
        sibling-&amp;gt;color = parent-&amp;gt;color;
        parent-&amp;gt;color = RBNode::BLACK;
        sibling-&amp;gt;left-&amp;gt;color = RBNode::BLACK;
        rightRotate(parent);
    } else if (node == parent-&amp;gt;left &amp;amp;&amp;amp;
               sibling-&amp;gt;left &amp;amp;&amp;amp; RBNode::RED == sibling-&amp;gt;left-&amp;gt;color) {
        // 待删除节点位于左子树，远侄子节点不存在，近侄子节点存在且为红色。此时父节点
        // 颜色不定，可黑可红。交换兄弟和近侄子颜色，兄弟节点右旋，然后按远侄子为红色
        // 的情况处理
        sibling-&amp;gt;left-&amp;gt;color = parent-&amp;gt;color;
        parent-&amp;gt;color = RBNode::BLACK;
        rightRotate(sibling);
        leftRotate(parent);
    } else if (node == parent-&amp;gt;right &amp;amp;&amp;amp;
               sibling-&amp;gt;right &amp;amp;&amp;amp; RBNode::RED == sibling-&amp;gt;right-&amp;gt;color) {
        // 待删除节点位于右子树，远侄子节点不存在，近侄子节点存在且为红色。此时父节点
        // 颜色不定，可黑可红。交换兄弟和近侄子颜色，兄弟节点左旋，然后按远侄子为红色
        // 的情况处理
        sibling-&amp;gt;right-&amp;gt;color = parent-&amp;gt;color;
        parent-&amp;gt;color = RBNode::BLACK;
        leftRotate(sibling);
        rightRotate(parent);
    } else if (RBNode::RED == parent-&amp;gt;color) {
        // 侄子节点不存在或者全为黑色，父节点为红色。交换父节点和兄弟节点颜色
        parent-&amp;gt;color = RBNode::BLACK;
        sibling-&amp;gt;color = RBNode::RED;
    } else {
        // 侄子节点不存在或者全为黑色，父节点为黑色。兄弟节点重绘成红色，然后调整父节点
        sibling-&amp;gt;color = RBNode::RED;
        erasionAdjust(parent);
    }
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;完整的参考代码&#34;&gt;完整的参考代码&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;struct RBNode {
    enum Color {
        RED, BLACK
    };

    int value;
    Color color;
    RBNode *left;
    RBNode *right;
    RBNode *parent;

    explicit RBNode(int data = 0) {
        value = data;
        color = RED;
        left = nullptr;
        right = nullptr;
        parent = nullptr;
    }

    ~RBNode() {
        delete left;
        delete right;
    }

    // 返回父节点的父节点
    RBNode *grandparent() const {
        if (!parent)
            return nullptr;
        return parent-&amp;gt;parent;
    }

    // 返回父节点的兄弟
    RBNode *uncle() const {
        if (!grandparent())
            return nullptr;
        if (parent == grandparent()-&amp;gt;right)
            return grandparent()-&amp;gt;left;
        else
            return grandparent()-&amp;gt;right;
    }

    // 返回自己的兄弟
    RBNode *sibling() const {
        if (!parent)
            return nullptr;
        if (parent-&amp;gt;left == this)
            return parent-&amp;gt;right;
        else
            return parent-&amp;gt;left;
    }
};

class RBTree {
public:
    RBTree() : rb_root(nullptr) {}

    ~RBTree() { delete rb_root; }

    RBNode *getRoot() const { return rb_root; }

    // 查找数据。如果找到数据则返回数据所在节点的指针，如果没有找到则返回nullptr。
    RBNode *search(int data);

    // 插入数据。如果data已存在，则什么也不做。
    // 如果应用时为key-value组合可改为更新value
    void insert(int data);

    // 删除数据
    void erase(int data);

    // 删除节点
    void erase(RBNode *node);

private:
    RBNode *rb_root;

    // 左旋
    void leftRotate(RBNode *root);

    // 右旋
    void rightRotate(RBNode *root);

    // 插入节点的调整
    void insertionAdjust(RBNode *p);

    void erasionAdjust(RBNode *node);
};

// 左旋
void RBTree::leftRotate(RBNode *root) {
    if (!root || !root-&amp;gt;right)
        return;

    // 右孩子变成新的根节点
    RBNode *new_root = root-&amp;gt;right;
    RBNode *parent = root-&amp;gt;parent;
    new_root-&amp;gt;parent = parent;
    if (!parent) {
        rb_root = new_root;
    } else {
        if (parent-&amp;gt;left == root)
            parent-&amp;gt;left = new_root;
        else
            parent-&amp;gt;right = new_root;
    }

    // 新的根节点的左孩子由原来的根节点收养为右孩子
    root-&amp;gt;right = new_root-&amp;gt;left;
    if (new_root-&amp;gt;left)
        new_root-&amp;gt;left-&amp;gt;parent = root;

    // 原来的根节点变成新的根节点的左孩子
    new_root-&amp;gt;left = root;
    root-&amp;gt;parent = new_root;
}

// 右旋
void RBTree::rightRotate(RBNode *root) {
    if (!root || !root-&amp;gt;left)
        return;

    // 左孩子变成新的根节点
    RBNode *new_root = root-&amp;gt;left;
    RBNode *parent = root-&amp;gt;parent;
    new_root-&amp;gt;parent = parent;
    if (!parent) {
        rb_root = new_root;
    } else {
        if (parent-&amp;gt;left == root)
            parent-&amp;gt;left = new_root;
        else
            parent-&amp;gt;right = new_root;
    }

    // 新的根节点的右孩子由原来的根节点收养为左孩子
    root-&amp;gt;left = new_root-&amp;gt;right;
    if (new_root-&amp;gt;right)
        new_root-&amp;gt;right = root;

    // 原来的根节点变成新的根节点的右孩子
    new_root-&amp;gt;right = root;
    root-&amp;gt;parent = new_root;
}

// 查找数据。
RBNode *RBTree::search(int data) {
    RBNode *p = rb_root;
    while (p &amp;amp;&amp;amp; p-&amp;gt;value != data) {
        if (data &amp;lt; p-&amp;gt;value)
            p = p-&amp;gt;left;
        else
            p = p-&amp;gt;right;
    }
    return p;
}

// 插入数据。如果data已存在，则什么也不做。
void RBTree::insert(int data) {
    // 空树插入为根节点，并绘制为黑色
    if (!rb_root) {
        rb_root = new RBNode(data);
        rb_root-&amp;gt;color = RBNode::BLACK;
        return;
    }

    RBNode *p = rb_root;
    while (true) {
        if (data == p-&amp;gt;value)  // 值已经存在什么也不做
            return;
        else if (data &amp;lt; p-&amp;gt;value) {
            if (p-&amp;gt;left) {
                p = p-&amp;gt;left;
            } else {
                p-&amp;gt;left = new RBNode(data);
                p-&amp;gt;left-&amp;gt;parent = p;
                return insertionAdjust(p-&amp;gt;left);
            }
        } else {
            if (p-&amp;gt;right) {
                p = p-&amp;gt;right;
            } else {
                p-&amp;gt;right = new RBNode(data);
                p-&amp;gt;right-&amp;gt;parent = p;
                return insertionAdjust(p-&amp;gt;right);
            }
        }
    }
}

void RBTree::insertionAdjust(RBNode *p) {
    if (!p-&amp;gt;parent) {  // 要调整的节点是根节点，重绘成黑色即可
        rb_root = p;
        rb_root-&amp;gt;color = RBNode::BLACK;
        return;
    } else if (p-&amp;gt;parent-&amp;gt;color == RBNode::RED) {
        // 父节点为黑色时什么也不用做，只考虑父节点为红色的情况，此时父节点不可能是
        // 根节点，即祖父节点必然存在
        if (p-&amp;gt;uncle() &amp;amp;&amp;amp; p-&amp;gt;uncle()-&amp;gt;color == RBNode::RED) {
            // 叔父节点存在且为红色，将父节点和叔父节点重绘为黑色，祖父节点重绘为红色，
            // 然后递归处理祖父节点
            p-&amp;gt;parent-&amp;gt;color = RBNode::BLACK;
            p-&amp;gt;uncle()-&amp;gt;color = RBNode::BLACK;
            p-&amp;gt;grandparent()-&amp;gt;color = RBNode::RED;
            insertionAdjust(p-&amp;gt;grandparent());
        } else { // 叔父节点不存在或者为黑色
            if (p == p-&amp;gt;parent-&amp;gt;left &amp;amp;&amp;amp; p-&amp;gt;parent == p-&amp;gt;grandparent()-&amp;gt;left) {
                p-&amp;gt;parent-&amp;gt;color = RBNode::BLACK;
                p-&amp;gt;grandparent()-&amp;gt;color = RBNode::RED;
                rightRotate(p-&amp;gt;grandparent());
            } else if (p == p-&amp;gt;parent-&amp;gt;right &amp;amp;&amp;amp; p-&amp;gt;parent == p-&amp;gt;grandparent()-&amp;gt;right) {
                p-&amp;gt;parent-&amp;gt;color = RBNode::BLACK;
                p-&amp;gt;grandparent()-&amp;gt;color = RBNode::RED;
                leftRotate(p-&amp;gt;grandparent());
            } else if (p == p-&amp;gt;parent-&amp;gt;right &amp;amp;&amp;amp; p-&amp;gt;parent == p-&amp;gt;grandparent()-&amp;gt;left) {
                leftRotate(p-&amp;gt;parent);
                p-&amp;gt;color = RBNode::BLACK;
                p-&amp;gt;parent-&amp;gt;color = RBNode::RED;
                rightRotate(p-&amp;gt;parent);
            } else { // p == p-&amp;gt;parent-&amp;gt;left &amp;amp;&amp;amp; p-&amp;gt;parent == p-&amp;gt;grandparent()-&amp;gt;right
                rightRotate(p-&amp;gt;parent);
                p-&amp;gt;color = RBNode::BLACK;
                p-&amp;gt;parent-&amp;gt;color = RBNode::RED;
                leftRotate(p-&amp;gt;parent);
            }
        }
    }
}

// 删除节点
void RBTree::erase(RBNode *node) {
    if (!node)   // 空指针什么也不做
        return;

    // node既有左孩子又有右孩子，从右子树中选择最小的节点，交换它和node的值，然后删除它
    if (node-&amp;gt;left &amp;amp;&amp;amp; node-&amp;gt;right) {
        RBNode *p = node-&amp;gt;right;
        while (p-&amp;gt;left)
            p = p-&amp;gt;left;
        node-&amp;gt;value = p-&amp;gt;value;   // 如果不是内置类型考虑使用移动语义
        node = p;
    }

    // node至多只有一个孩子，根据周围的节点情况调整。几种使用孩子节点替换的情况不在
    // erasionAdjust中，必须单独考虑
    RBNode *parent = node-&amp;gt;parent;
    if (RBNode::RED == node-&amp;gt;color) {
        // 红色节点直接删除，其它什么也不做
    } else if (node-&amp;gt;left &amp;amp;&amp;amp; RBNode::RED == node-&amp;gt;left-&amp;gt;color) {
        // 待删除节点为黑色，左孩子存在且为红色。以左孩子替代它并重绘为黑色
        node-&amp;gt;left-&amp;gt;color = RBNode::BLACK;
    } else if (node-&amp;gt;right &amp;amp;&amp;amp; RBNode::RED == node-&amp;gt;right-&amp;gt;color) {
        // 待删除节点为黑色，右孩子存在且为红色。以右孩子替代它并重绘为黑色
        node-&amp;gt;right-&amp;gt;color = RBNode::BLACK;
    } else {
        erasionAdjust(node);
    }

    // 把node从红黑树中摘下来并删除
    if (!parent) {
        if (node-&amp;gt;left)
            rb_root = node-&amp;gt;left;
        else
            rb_root = node-&amp;gt;right;
    } else {
        if (node == parent-&amp;gt;left) {
            if (node-&amp;gt;left)
                parent-&amp;gt;left = node-&amp;gt;left;
            else
                parent-&amp;gt;left = node-&amp;gt;right;
        } else {
            if (node-&amp;gt;left)
                parent-&amp;gt;right = node-&amp;gt;left;
            else
                parent-&amp;gt;right = node-&amp;gt;right;
        }
    }
    node-&amp;gt;left = nullptr;
    node-&amp;gt;right = nullptr;
    delete node;
}

// 调整待删除节点周围的节点以满足红黑树的定义。被调整的节点不一定是将要被删除的节点，
// 有一种情况需要递归调整父节点，因此不能包含几种使用孩子节点替换的情况。
void RBTree::erasionAdjust(RBNode *node) {
    // 待删除节点为黑色，且孩子不为红色，此时如果左孩子或者右孩子存在且为黑色，则一条
    // 路径比另一条多一个黑色节点，所以左右孩子必定都不存在，待删除节点为叶子节点，此
    // 时如果待删除节点不是根节点则其兄弟节点必定存在，否则待删除节点所在路径多一个黑
    // 色节点。
    if (node == rb_root)  // 黑色节点可能为根节点，整棵树只有这一个节点，删除即可
        return;

    // 待删除节点不为根节点，则兄弟节点必然存在
    RBNode *parent = node-&amp;gt;parent;
    RBNode *sibling = node-&amp;gt;sibling();

    if (RBNode::RED == sibling-&amp;gt;color) {
        // 兄弟节点为红色，此时父节点必为黑色。旋转父节点，交换父节点和兄弟节点的颜色，
        // 然后按其它情况处理。
        parent-&amp;gt;color = RBNode::RED;
        sibling-&amp;gt;color = RBNode::BLACK;

        if (node == parent-&amp;gt;left)
            leftRotate(parent);
        else
            rightRotate(parent);

        // 旋转后兄弟节点变成了sibling的孩子，此节点和sibling的另一个孩子必存在且为黑色
        sibling = node-&amp;gt;sibling();
    }

    // sibling-&amp;gt;color == RBNode::BLACK必然成立，即兄弟节点必为黑色
    if (node == parent-&amp;gt;left &amp;amp;&amp;amp;
        sibling-&amp;gt;right &amp;amp;&amp;amp; RBNode::RED == sibling-&amp;gt;right-&amp;gt;color) {
        // 待删除节点位于左子树，远侄子节点存在且为红色。此时父节点颜色不定，可黑可红。
        // 交换父节点和兄弟节点颜色，父节点左旋，远侄子重绘为黑色
        sibling-&amp;gt;color = parent-&amp;gt;color;
        parent-&amp;gt;color = RBNode::BLACK;
        sibling-&amp;gt;right-&amp;gt;color = RBNode::BLACK;
        leftRotate(parent);
    } else if (node == parent-&amp;gt;right &amp;amp;&amp;amp;
               sibling-&amp;gt;left &amp;amp;&amp;amp; RBNode::RED == sibling-&amp;gt;left-&amp;gt;color) {
        // 待删除节点位于右子树，远侄子节点存在且为红色。此时父节点颜色不定，可黑可红。
        // 交换父节点和兄弟节点的颜色，父节点右旋，远侄子重绘为黑色
        sibling-&amp;gt;color = parent-&amp;gt;color;
        parent-&amp;gt;color = RBNode::BLACK;
        sibling-&amp;gt;left-&amp;gt;color = RBNode::BLACK;
        rightRotate(parent);
    } else if (node == parent-&amp;gt;left &amp;amp;&amp;amp;
               sibling-&amp;gt;left &amp;amp;&amp;amp; RBNode::RED == sibling-&amp;gt;left-&amp;gt;color) {
        // 待删除节点位于左子树，远侄子节点不存在，近侄子节点存在且为红色。此时父节
        // 点颜色不定，可黑可红。交换兄弟和近侄子颜色，兄弟节点右旋，然后按远侄子为
        // 红色的情况处理
        sibling-&amp;gt;left-&amp;gt;color = parent-&amp;gt;color;
        parent-&amp;gt;color = RBNode::BLACK;
        rightRotate(sibling);
        leftRotate(parent);
    } else if (node == parent-&amp;gt;right &amp;amp;&amp;amp;
               sibling-&amp;gt;right &amp;amp;&amp;amp; RBNode::RED == sibling-&amp;gt;right-&amp;gt;color) {
        // 待删除节点位于右子树，远侄子节点不存在，近侄子节点存在且为红色。此时父节
        // 点颜色不定，可黑可红。交换兄弟和近侄子颜色，兄弟节点左旋，然后按远侄子为
        // 红色的情况处理
        sibling-&amp;gt;right-&amp;gt;color = parent-&amp;gt;color;
        parent-&amp;gt;color = RBNode::BLACK;
        leftRotate(sibling);
        rightRotate(parent);
    } else if (RBNode::RED == parent-&amp;gt;color) {
        // 侄子节点不存在或者全为黑色，父节点为红色。交换父节点和兄弟节点颜色
        parent-&amp;gt;color = RBNode::BLACK;
        sibling-&amp;gt;color = RBNode::RED;
    } else {
        // 侄子节点不存在或者全为黑色，父节点为黑色。兄弟节点重绘成红色，然后调整父节点
        sibling-&amp;gt;color = RBNode::RED;
        erasionAdjust(parent);
    }
}

// 删除数据
void RBTree::erase(int data) {
    RBNode *node = search(data);
    erase(node);
}

      <div class="item">
        <a class="result-title" style="opacity: 0;" href="https://w-jin.github.io/post/ping-heng-er-cha-shu/"" data-c="
          &lt;h2 id=&#34;定义&#34;&gt;定义&lt;/h2&gt;
&lt;p&gt;平衡二叉查找树简称平衡二叉树，则前苏联数学家Adelse-Velskill和Landis发明，所以又称AVL树。它满足：&lt;br&gt;
1、为二叉查找树；&lt;br&gt;
2、为空树；&lt;br&gt;
3、如果不是空树，任意一个节点的左子树和右子树都是平衡二叉树，且高度之差不超过1。&lt;/p&gt;
&lt;p&gt;平衡因子：某节点的平衡因子定义为其左右子树高度之差。在平衡二叉树，任意节点的平衡因子只能取-1、0和1。&lt;/p&gt;
&lt;p&gt;平衡二叉树的节点定义为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;struct AVLNode {
    int value;         // 节点值，使用更改为需要的类型或者使用模板
    int depth;         // 深度，即以此节点为根节点的子树高度
    int balance;       // 平衡因子，左子树高度减去右子树高度
 
    AVLNode *parent;   // 父节点
    AVLNode *left;     // 左孩子
    AVLNode *right;    // 右孩子

    explicit AVLNode(int value) : value(value) {
        depth = 0;
        balance = 0;
        parent = left = right = nullptr;
    }

    ~AVLNode() {
        delete left;
        delete right;
    }
};
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;平衡二叉树定义为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;class AVL {
public:
    AVL() : avl_root(nullptr) {}

    ~AVL() {
        delete avl_root;
    }

    // 查找数据。如果找到数据则返回数据所在节点的指针，如果没有找到则返回nullptr。
    AVLNode *search(int data);

    // 插入数据。如果data已存在，则什么也不做。
    // 如果应用时为key-value组合可改为更新value
    void insert(int data);

    // 删除数据
    void erase(int data);

    // 删除节点
    void erase(AVLNode *node);

    AVLNode *getRoot() const { return avl_root; }

private:
    AVLNode *avl_root;

    // 计算节点深度，假定其孩子节点的深度已经计算完毕
    static int getDepth(AVLNode *root);

    // 计算节点平衡因子，假定其孩子节点的深度已经计算完毕
    static int getBalance(AVLNode *root);

    // 左旋
    void leftRotate(AVLNode *root);

    // 右旋
    void rightRotate(AVLNode *root);
};
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;查找数据&#34;&gt;查找数据&lt;/h2&gt;
&lt;p&gt;平衡二叉树是一种查找二叉树，主要目的仍是为了快速查找数据，查找过程与普通的二叉查找树没有区别，代码描述如下：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 对外接口
public: AVLNode *search(int data) {
    return search(avl_root, data);
}

// 递归实现(也可以用循环实现，不需要使用栈记录路径)
private: AVLNode *AVL::search(AVLNode *root, int data) {
    if (!root)
        return nullptr;
    if (root-&amp;gt;value == data)
        return root;
    else if (root-&amp;gt;value &amp;lt; data)
        return search(root-&amp;gt;right, data);
    else
        return search(root-&amp;gt;left, data);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;如果找到数据则返回数据所在的节点指针，如果没有找到数据则返回nullptr;&lt;/p&gt;
&lt;h2 id=&#34;辅助函数&#34;&gt;辅助函数&lt;/h2&gt;
&lt;p&gt;在维护平衡二叉树过程中，需要从子树计算节点的深度和平衡因子而不能直接使用节点保存的信息，此处给出两个函数用于计算节点的深度和平衡因子，此处假定节点的孩子的深度已经计算好。&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 计算节点深度，假定其孩子节点的深度已经计算完毕
int AVL::getDepth(AVLNode *root) {
    if (!root)
        return 0;
    int left_depth = root-&amp;gt;left ? root-&amp;gt;left-&amp;gt;depth : 0;
    int right_depth = root-&amp;gt;right ? root-&amp;gt;right-&amp;gt;depth : 0;
    return (left_depth &amp;gt; right_depth ? left_depth : right_depth) + 1;
}

// 计算节点平衡因子，假定其孩子节点的深度已经计算完毕
int AVL::getBalance(AVLNode *root) {
    if (!root)
        return 0;
    int left_depth = root-&amp;gt;left ? root-&amp;gt;left-&amp;gt;depth : 0;
    int right_depth = root-&amp;gt;right ? root-&amp;gt;right-&amp;gt;depth : 0;
    return left_depth - right_depth;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;左旋&#34;&gt;左旋&lt;/h2&gt;
&lt;p&gt;在插入节点到平衡二叉树时，或者从平衡二叉树删除节点时，可能破坏二叉树的平衡性，为了将这样的二叉树重新调整为平衡二叉树，一般使用旋转操作。旋转具体分为左旋与右旋。&lt;/p&gt;
&lt;p&gt;左旋用于将一棵平衡因子为-2的二叉树旋转为平衡二叉树，即原树左子树的高度比右子树的高度小2，绕根节点旋转后左子树高度与右子树高度相同。左旋的一个示例如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/leftRotate.png&#34; alt=&#34;leftRotate&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;代码描述为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 左旋
void AVL::leftRotate(AVLNode *root) {
    if (!root || !root-&amp;gt;right)
        return;

    // 右孩子变成根节点
    AVLNode *new_root = root-&amp;gt;right;
    AVLNode *parent = root-&amp;gt;parent;
    new_root-&amp;gt;parent = parent;
    if (parent) {
        if (parent-&amp;gt;left == root)
            parent-&amp;gt;left = new_root;
        else
            parent-&amp;gt;right = new_root;
    } else {  // 整棵树都旋转了，根节点需要改变
        avl_root = new_root;
    }

    // 右孩子的左子树变成root的右子树
    root-&amp;gt;right = new_root-&amp;gt;left;
    if (new_root-&amp;gt;left)
        new_root-&amp;gt;left-&amp;gt;parent = root;

    // root成为右孩子(原来的)的左子树
    new_root-&amp;gt;left = root;
    root-&amp;gt;parent = new_root;

    // 更新深度信息
    root-&amp;gt;depth = getDepth(root);
    root-&amp;gt;balance = getBalance(root);
    new_root-&amp;gt;depth = getDepth(new_root);
    new_root-&amp;gt;balance = getBalance(new_root);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;右旋&#34;&gt;右旋&lt;/h2&gt;
&lt;p&gt;右旋用于将一棵平衡因子为2的二叉树旋转为平衡二叉树，即原树的左子树比右子树的高度大2，绕根节点旋转后高度相同，如:&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/rightRotate.png&#34; alt=&#34;rightRotate&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;代码描述为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 右旋
void AVL::rightRotate(AVLNode *root) {
    if (!root || !root-&amp;gt;left)
        return;

    // 左孩子变成根节点
    AVLNode *new_root = root-&amp;gt;left;
    AVLNode *parent = root-&amp;gt;parent;
    new_root-&amp;gt;parent = parent;
    if (parent) {
        if (parent-&amp;gt;left == root)
            parent-&amp;gt;left = new_root;
        else
            parent-&amp;gt;right = new_root;
    } else {  // 整棵树都旋转了，根节点需要改变
        avl_root = new_root;
    }

    // 左孩子的右子树变成root的左子树
    root-&amp;gt;left = new_root-&amp;gt;right;
    if (new_root-&amp;gt;right)
        new_root-&amp;gt;right-&amp;gt;parent = root;

    // root成为其左孩子(原来)的右子树
    new_root-&amp;gt;right = root;
    root-&amp;gt;parent = new_root;

    // 更新深度信息
    root-&amp;gt;depth = getDepth(root);
    root-&amp;gt;balance = getBalance(root);
    new_root-&amp;gt;depth = getDepth(new_root);
    new_root-&amp;gt;balance = getBalance(new_root);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;左旋和右旋的代码非常相似，主要考虑这几个步骤：1、改变根节点，可能需要改变整棵树的根节点；2、由原来的根节点收养旋转后由它占去的位置上的分支；3、原来的根节点成为新的根节点的子树；4、重新计算深度和平衡因子。&lt;/p&gt;
&lt;h2 id=&#34;插入&#34;&gt;插入&lt;/h2&gt;
&lt;p&gt;插入数据首先需要考虑是否为空树，如果是空树则直接插入为根节点即可。如果不是空树，则和查找的过程类似(不考虑已经数据的情况)：1、如果data &amp;lt; root-&amp;gt;value，则将它插入到root的左子树中，如果root没有左子树，则将它插入为root的左子树；2、如果data &amp;gt; root-&amp;gt;value，则将它插入到root的右子树中，如果root没有右子树，则将它插入为root的右子树。&lt;/p&gt;
&lt;p&gt;插入节点之后，二叉树的平衡性可能被打破，此时可以通过旋转操作来重新使二叉树平衡。每次插入操作不需要对整个二叉树进行调整，只需要调整失衡的部分即可。从插入节点向上第一个平衡因子的绝对值大于1的节点为根的子树称为最小失衡树。平衡二叉树的失衡通过旋转最小失衡树来调整，哪边的子树较高，就把哪边的子树旋转上来。&lt;/p&gt;
&lt;p&gt;根据引起失衡的节点在最小失衡树A中的插入位置，可以分为以下四种情况：&lt;/p&gt;
&lt;p&gt;1、插入在A的左孩子的左子树中(LL)&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/insert1.png&#34; alt=&#34;insert1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;做一次右旋即可。&lt;/p&gt;
&lt;p&gt;2、插入在A的右孩子的右子树中(RR)&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;4&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/insert2.png&#34; alt=&#34;insert2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;做一次左旋即可。&lt;/p&gt;
&lt;p&gt;3、插入在A的左孩子的右子树中(LR)&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;5&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/insert3.1.png&#34; alt=&#34;insert3.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;只做一次右旋仍然不能平衡，因此需要先对左子树做一次左旋变成第一种情况，然后再做一次右旋使二叉树平衡：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;6&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/insert3.2.png&#34; alt=&#34;insert3.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;4、插入在A的右孩子的左子树中(RL)&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;7&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/insert4.1.png&#34; alt=&#34;insert4.1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;一次左旋后仍然不能平衡，需要先对右子树做一次右旋变成第二种情况，然后再做一次左旋使二叉树平衡：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;8&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/insert4.2.png&#34; alt=&#34;insert4.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;在实际的插入过程中，插入之后，往上递归，先计算当前节点的平衡因子，如果平衡因子是2则表明左高右低，需要右旋，右旋之前再检查一下其左子树的平衡因子，如果平衡因子是0或者1就是第1种情况，如果平衡因子是-1则为第3种情况，需要先对左子树进行左旋。如果当前节点的平衡因子是-2则表明左低右高，需要左旋，左旋之前检查一下其右子树的平衡因子，如果是1则为第4种情况，需要先对右子树进行右旋。代码描述为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 公共接口，插入数据。如果data已存在，则什么也不做。
// 如果应用时为key-value组合可改为更新value
public: void AVL::insert(int data) {
    if (!avl_root) {
        avl_root = new AVLNode(data);
        return;
    }
    insert(avl_root, data);
}

// 递归插入数据。假定根节点不为空
private: void AVL::insert(AVLNode *root, int data) {
    // 要插入的数据小于根节点，往左边插入
    if (data &amp;lt; root-&amp;gt;value) {
        if (root-&amp;gt;left)
            insert(root-&amp;gt;left, data);
        else {
            root-&amp;gt;left = new AVLNode(data);
            root-&amp;gt;left-&amp;gt;parent = root;
        }
    }
        // 要插入的数据大于根节点，往右边插入
    else if (data &amp;gt; root-&amp;gt;value) {
        if (root-&amp;gt;right)
            insert(root-&amp;gt;right, data);
        else {
            root-&amp;gt;right = new AVLNode(data);
            root-&amp;gt;right-&amp;gt;parent = root;
        }
    }
        // data已经存在，什么也不做，如果为key-value组合可改为更新value
    else {   // data == root-&amp;gt;value
        return;
    }

    // 计算平衡因子
    root-&amp;gt;balance = getBalance(root);

    // 左子树比右子树高，应当右旋
    if (root-&amp;gt;balance == 2) {
        // 如果左子树的右子树比左子树的左子树高，直接右旋后仍然不平衡，必须先对左子树进行左旋
        if (root-&amp;gt;left-&amp;gt;balance == -1)
            leftRotate(root-&amp;gt;left);
        rightRotate(root);
    }
        // 右子树比左子树高，应当左旋
    else if (root-&amp;gt;balance == -2) {
        // 如果右子树的左子树比右子树的右子树高，必须先对右子树右旋
        if (root-&amp;gt;right-&amp;gt;balance == 1)
            rightRotate(root-&amp;gt;right);
        leftRotate(root);
    }

    // 更新深度，平衡因子已经计算过了，如果有旋转，则平衡因子在旋转的函数中更新，
    // 而深度在这时重复计算
    root-&amp;gt;depth = getDepth(root);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;插入节点之后从下往上维护平衡性，遇到的第一个不平衡的节点即为最小失衡树的根节点，通过旋转使最小失衡树使二叉树重新平衡。可以看出以上四种插入都不改变最小失衡树的高度，因此最小失衡树往上的节点的深度和平衡因子都不会改变，也不会失衡。所以插入操作最多需要两次旋转，时间复杂度为O(log n)。&lt;/p&gt;
&lt;h2 id=&#34;删除节点&#34;&gt;删除节点&lt;/h2&gt;
&lt;p&gt;平衡二叉树是一种二叉搜索树，删除节点之后必须保证节点的值满足二叉搜索树的要求，因此此处先给出二叉搜索树删除节点的思路。二叉搜索树删除节点时根据节点的子树情况来考虑：&lt;br&gt;
1、被删除节点为叶子节点，直接删除即可，需要考虑此节点有根节点的情况；&lt;br&gt;
2、被删除节点只有左孩子，或者只有右孩子。有两种思路：&lt;br&gt;
(1) 无论是左子树还是右子树，它们的所有节点的值都是大于被删除节点的父节点的，因此可以直接将左子树或者右子树移动上来替换掉被删除节点；&lt;br&gt;
(2) 只有左孩子则在左子树寻找拥有最大值的节点，只有右孩子则在右子树中寻找拥有最小值的节点，将它的值与被删除节点的值交换，然后递归删除找到的节点。这是一个递归的过程，比第一种思路复杂，后面从平衡二叉树中删除节点采用第1种思路。&lt;br&gt;
3、被删除节点既有左孩子又有右孩子。可以从左子树中寻找拥有最大值的节点，或者从右子树中寻找拥有最小值的节点，将它的值与被删除节点交换，然后递归删除找到的节点。显然左子树中拥有最大值的节点不可能有右孩子，右子树中拥有最小值的节点不可能有左孩子，因此交换一次后，需要递归删除的节点必定是第2种情况。考虑到要使二叉搜索树左右子树的高度尽量接近，以提升查找的性能，此处可以选择左右子树高度较高的一边进行递归删除。&lt;/p&gt;
&lt;p&gt;下面的图演示了如何从二叉搜索树删除节点。&lt;/p&gt;
&lt;p&gt;1、二叉搜索树删除叶子节点&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;9&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/erase1.png&#34; alt=&#34;erase1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;2.1、二叉搜索树删除只有左孩子的节点&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;10&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/erase2.1.png&#34; alt=&#34;erase2.1&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;2.2、递归删除只有左孩子的节点&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;11&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/erase2.2.png&#34; alt=&#34;erase2.2&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;此处4和3交换之后4已经是叶子节点，直接删除即可，如果3还有左子树，则交换过后4仍然是只有左孩子的节点，重复此过程直到4为叶子节点即可。删除只有右孩子的节点与此类似，此处不再赘述。&lt;/p&gt;
&lt;p&gt;3、删除既有左孩子又有右孩子的节点&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;12&#34;&gt;&lt;img src=&#34;https://w-jin.github.io/post-images/avl/erase3.png&#34; alt=&#34;erase3&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;交换一次之后，3只有左子树而没有右子树，按2的情况处理即可。&lt;/p&gt;
&lt;p&gt;二叉搜索树的删除比较简单，此处不再给出代码，接下来考虑如何从平衡二叉树中删除节点，即考虑二叉树删除节点之后如何调整使其重新平衡。比较简单的策略是从删除的节点开始向上更新深度和平衡因子，如果平衡因子为-2或者2则进行左旋或者右旋，一直到根节点。代码描述如下：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;void AVL::erase(AVLNode *node) {
    // 空指针什么也不做
    if (!node)
        return;

    AVLNode *parent = node-&amp;gt;parent;

    // node既有左孩子又有右孩子
    if (node-&amp;gt;left &amp;amp;&amp;amp; node-&amp;gt;right) {
        AVLNode *replace_node = nullptr;
        if (node-&amp;gt;left-&amp;gt;depth &amp;gt; node-&amp;gt;right-&amp;gt;depth) {  // 左树高，从左树选最大值替换
            replace_node = node-&amp;gt;left;
            while (replace_node-&amp;gt;right)
                replace_node = replace_node-&amp;gt;right;
        } else {  // 右树高，从右树选最小值替换
            replace_node = node-&amp;gt;right;
            while (replace_node-&amp;gt;left)
                replace_node = replace_node-&amp;gt;left;
        }

        // 将replace_node的值移动上来，然后删除replace_node，它最多只有一个孩子
        node-&amp;gt;value = replace_node-&amp;gt;value;   // 非内置类型可能需要移动语义
        node = replace_node;
    }

    // 如果node只有左孩子或者只有右孩子或者没有孩子
    if (!node-&amp;gt;left &amp;amp;&amp;amp; !node-&amp;gt;right) {  // 叶子节点
        if (!parent) {  // 根节点
            avl_root = nullptr;
        } else {        // 非根节点
            if (node == parent-&amp;gt;left)
                parent-&amp;gt;left = nullptr;
            else
                parent-&amp;gt;right = nullptr;
        }
    } else if (node-&amp;gt;left &amp;amp;&amp;amp; !node-&amp;gt;right) {  // 只有左孩子
        if (!parent) {  // 根节点
            avl_root = node-&amp;gt;left;
        } else {        // 非根节点
            if (node == parent-&amp;gt;left)
                parent-&amp;gt;left = node-&amp;gt;left;
            else
                parent-&amp;gt;right = node-&amp;gt;left;
        }
        node-&amp;gt;left = nullptr;
    } else {  // 只有右孩子
        if (!parent) {  // 根节点
            avl_root = node-&amp;gt;right;
        } else {        // 非根节点
            if (node == parent-&amp;gt;left)
                parent-&amp;gt;left = node-&amp;gt;right;
            else
                parent-&amp;gt;right = node-&amp;gt;right;
        }
        node-&amp;gt;right = nullptr;
    }
    delete node;

    // 向上更新节点深度
    while (parent) {
        parent-&amp;gt;depth = getDepth(parent);
        parent-&amp;gt;balance = getBalance(parent);

        if (parent-&amp;gt;balance == -2) {
            if (parent-&amp;gt;right-&amp;gt;balance == 1)
                rightRotate(parent-&amp;gt;right);
            leftRotate(parent);
        } else if (parent-&amp;gt;balance == 2) {
            if (parent-&amp;gt;left-&amp;gt;balance == -1)
                leftRotate(parent-&amp;gt;left);
            rightRotate(parent);
        }

        parent = parent-&amp;gt;parent;
    }
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这段代码和二叉搜索树删除节点的代码相比，只多了向上更新节点深度和平衡因子的代码，将这部分代码去掉即可得到二叉搜索树的删除节点代码。值得注意的是删除节点不能只通过调整最小失衡树来使二叉树重新平衡，最坏情况下需要回溯到根节点，进行多次旋转。&lt;/p&gt;
&lt;p&gt;除上述函数之外，还需要一个根据给定数据查找并删除节点的函数，作简单的封装即可：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;void AVL::erase(int data) {
    AVLNode *node = search(data);
    erase(node);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;优化&#34;&gt;优化&lt;/h2&gt;
&lt;p&gt;1、使用循环重写以上代码。查找数据不需要记录路径，不需要使用栈，而插入数据和删除数据时需要更新祖先节点的深度和平衡因子，可以使用栈来记录路径，也可以使用parent指针回溯。&lt;/p&gt;
&lt;p&gt;2、插入更新时：如果当前节点的高度没有改变，则停止向上回溯父节点。&lt;/p&gt;
&lt;p&gt;3、删除更新时：如果当前节点的高度没有改变，且平衡值在[-1, 1]区间则停止回溯。&lt;/p&gt;
&lt;p&gt;查找函数的循环实现&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;AVLNode *AVL::search(int data) {
    AVLNode *p = avl_root;
    while (p &amp;amp;&amp;amp; p-&amp;gt;value != data) {
        if (data &amp;lt; p-&amp;gt;value)
            p = p-&amp;gt;left;
        else
            p = p-&amp;gt;right;
    }
    return p;
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;当平衡二叉树为空时或者平衡二叉树中不存在data这个值时，循环将于p为nullptr时停止，然后返回nullptr表示没有找到。&lt;/p&gt;
&lt;p&gt;插入函数的优化实现&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;void AVL::insert(int data) {
    if (!avl_root) {
        avl_root = new AVLNode(data);
        return;
    }

    AVLNode *p = avl_root;
    while (true) {
        // 如果data在平衡二叉树中已经存在则什么也不做，
        // 实际应用时如果是key-value的类型可以更新value
        if (p-&amp;gt;value == data) {
            return;
        } else if (data &amp;lt; p-&amp;gt;value) {   // 插入到左子树中
            if (p-&amp;gt;left) {
                p = p-&amp;gt;left;
            } else {
                p-&amp;gt;left = new AVLNode(data);
                p-&amp;gt;left-&amp;gt;parent = p;
                break;
            }
        } else {  // 插入到右子树中
            if (p-&amp;gt;right) {
                p = p-&amp;gt;right;
            } else {
                p-&amp;gt;right = new AVLNode(data);
                p-&amp;gt;right-&amp;gt;parent = p;
                break;
            }
        }
    }

    // 向上更新节点深度和平衡因子
    while (p) {
        int depth_record = p-&amp;gt;depth;

        p-&amp;gt;balance = getBalance(p);
        if (p-&amp;gt;balance == -2) {   // 左旋
            if (p-&amp;gt;right-&amp;gt;balance == 1)
                rightRotate(p-&amp;gt;right);
            leftRotate(p);
        } else if (p-&amp;gt;balance == 2) {  // 右旋
            if (p-&amp;gt;left-&amp;gt;balance == -1)
                leftRotate(p-&amp;gt;left);
            rightRotate(p);
        }

        // 如果p的深度不变，则p的祖先节点的深度和平衡因子都不变，无需继续回溯
        p-&amp;gt;depth = getDepth(p);
        if (depth_record == p-&amp;gt;depth)
            return;

        p = p-&amp;gt;parent;
    }
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;此处使用parent指针进行回溯，当某个节点的深度不变时不会再对其祖先节点造成影响，因此回溯可以提前终止。&lt;/p&gt;
&lt;p&gt;删除节点函数的优化实现&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;void AVL::erase(AVLNode *node) {
    // 空指针什么也不做
    if (!node)
        return;

    AVLNode *parent = node-&amp;gt;parent;

    // node既有左孩子又有右孩子
    if (node-&amp;gt;left &amp;amp;&amp;amp; node-&amp;gt;right) {
        AVLNode *replace_node = nullptr;
        if (node-&amp;gt;left-&amp;gt;depth &amp;gt; node-&amp;gt;right-&amp;gt;depth) {  // 左树高，从左树选最大值替换
            replace_node = node-&amp;gt;left;
            while (replace_node-&amp;gt;right)
                replace_node = replace_node-&amp;gt;right;
        } else {  // 右树高，从右树选最小值替换
            replace_node = node-&amp;gt;right;
            while (replace_node-&amp;gt;left)
                replace_node = replace_node-&amp;gt;left;
        }

        // 将replace_node的值移动上来，然后删除replace_node，它最多只有一个孩子
        node-&amp;gt;value = replace_node-&amp;gt;value;   // 非内置类型可能需要移动语义
        node = replace_node;
    }

    // 如果node只有左孩子或者只有右孩子或者没有孩子
    if (!node-&amp;gt;left &amp;amp;&amp;amp; !node-&amp;gt;right) {  // 叶子节点
        if (!parent) {  // 根节点
            avl_root = nullptr;
        } else {        // 非根节点
            if (node == parent-&amp;gt;left)
                parent-&amp;gt;left = nullptr;
            else
                parent-&amp;gt;right = nullptr;
        }
    } else if (node-&amp;gt;left &amp;amp;&amp;amp; !node-&amp;gt;right) {  // 只有左孩子
        if (!parent) {  // 根节点
            avl_root = node-&amp;gt;left;
        } else {        // 非根节点
            if (node == parent-&amp;gt;left)
                parent-&amp;gt;left = node-&amp;gt;left;
            else
                parent-&amp;gt;right = node-&amp;gt;left;
        }
        node-&amp;gt;left = nullptr;
    } else {  // 只有右孩子
        if (!parent) {  // 根节点
            avl_root = node-&amp;gt;right;
        } else {        // 非根节点
            if (node == parent-&amp;gt;left)
                parent-&amp;gt;left = node-&amp;gt;right;
            else
                parent-&amp;gt;right = node-&amp;gt;right;
        }
        node-&amp;gt;right = nullptr;
    }
    delete node;

    // 向上更新节点深度
    while (parent) {
        int depth_record = parent-&amp;gt;depth;

        parent-&amp;gt;balance = getBalance(parent);
        if (parent-&amp;gt;balance == -2) {
            if (parent-&amp;gt;right-&amp;gt;balance == 1)
                rightRotate(parent-&amp;gt;right);
            leftRotate(parent);
        } else if (parent-&amp;gt;balance == 2) {
            if (parent-&amp;gt;left-&amp;gt;balance == -1)
                leftRotate(parent-&amp;gt;left);
            rightRotate(parent);
        }

        // 如果某个节点的深度不变，则无需继续向上回溯
        parent-&amp;gt;depth = getDepth(parent);
        if (depth_record == parent-&amp;gt;depth)
            return;

        parent = parent-&amp;gt;parent;
    }
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;erase函数和之前大同小异，和insert类似，仅增加了判断节点深度是否变化的逻辑。&lt;/p&gt;
&lt;p&gt;此外，可以看到insert和erase中向上更新节点深度和平衡因子的代码是完全一样的，可以将其单独拿出来作为一个函数：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;void siftup(AVLNode *p) {
    while (p) {
        int depth_record = p-&amp;gt;depth;

        p-&amp;gt;balance = getBalance(p);
        if (p-&amp;gt;balance == -2) {   // 左旋
            if (p-&amp;gt;right-&amp;gt;balance == 1)
                rightRotate(p-&amp;gt;right);
            leftRotate(p);
        } else if (p-&amp;gt;balance == 2) {  // 右旋
            if (p-&amp;gt;left-&amp;gt;balance == -1)
                leftRotate(p-&amp;gt;left);
            rightRotate(p);
        }

        // 如果p的深度不变，则p的祖先节点的深度和平衡因子都不变，无需继续回溯
        p-&amp;gt;depth = getDepth(p);
        if (depth_record == p-&amp;gt;depth)
            return;

        p = p-&amp;gt;parent;
    }
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;完整参考代码&#34;&gt;完整参考代码&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;struct AVLNode {
    int value;         // 节点值，使用更改为需要的类型或者使用模板
    int depth;         // 深度，即以此节点为根节点的子树高度
    int balance;       // 平衡因子，左子树高度减去右子树高度

    AVLNode *parent;   // 父节点
    AVLNode *left;     // 左孩子
    AVLNode *right;    // 右孩子

    explicit AVLNode(int value) : value(value) {
        depth = 1;
        balance = 0;
        parent = left = right = nullptr;
    }

    // 析构函数，递归删除二叉树，这样只需要删除根节点即可删除整个二叉树
    ~AVLNode() {
        delete left;
        delete right;
    }
};

class AVL {
public:
    AVL() : avl_root(nullptr) {}

    ~AVL() {
        delete avl_root;
    }

    // 查找数据。如果找到数据则返回数据所在节点的指针，如果没有找到则返回nullptr。
    AVLNode *search(int data);

    // 插入数据。如果data已存在，则什么也不做。
    // 如果应用时为key-value组合可改为更新value
    void insert(int data);

    // 删除数据
    void erase(int data);

    // 删除节点
    void erase(AVLNode *node);

    AVLNode *getRoot() const { return avl_root; }

private:
    AVLNode *avl_root;

    // 计算节点深度，假定其孩子节点的深度已经计算完毕
    static int getDepth(AVLNode *root);

    // 计算节点平衡因子，假定其孩子节点的深度已经计算完毕
    static int getBalance(AVLNode *root);

    // 左旋
    void leftRotate(AVLNode *root);

    // 右旋
    void rightRotate(AVLNode *root);
};

int AVL::getDepth(AVLNode *root) {
    if (!root)
        return 0;
    int left_depth = root-&amp;gt;left ? root-&amp;gt;left-&amp;gt;depth : 0;
    int right_depth = root-&amp;gt;right ? root-&amp;gt;right-&amp;gt;depth : 0;
    return (left_depth &amp;gt; right_depth ? left_depth : right_depth) + 1;
}

int AVL::getBalance(AVLNode *root) {
    if (!root)
        return 0;
    int left_depth = root-&amp;gt;left ? root-&amp;gt;left-&amp;gt;depth : 0;
    int right_depth = root-&amp;gt;right ? root-&amp;gt;right-&amp;gt;depth : 0;
    return left_depth - right_depth;
}

void AVL::leftRotate(AVLNode *root) {
    if (!root || !root-&amp;gt;right)
        return;

    // 右孩子变成根节点
    AVLNode *new_root = root-&amp;gt;right;
    AVLNode *parent = root-&amp;gt;parent;
    new_root-&amp;gt;parent = parent;
    if (parent) {
        if (parent-&amp;gt;left == root)
            parent-&amp;gt;left = new_root;
        else
            parent-&amp;gt;right = new_root;
    } else {  // 整棵树都旋转了，根节点需要改变
        avl_root = new_root;
    }

    // 右孩子的左子树变成root的右子树
    root-&amp;gt;right = new_root-&amp;gt;left;
    if (new_root-&amp;gt;left)
        new_root-&amp;gt;left-&amp;gt;parent = root;

    // root成为右孩子(原来的)的左子树
    new_root-&amp;gt;left = root;
    root-&amp;gt;parent = new_root;

    // 更新深度信息
    root-&amp;gt;depth = getDepth(root);
    root-&amp;gt;balance = getBalance(root);
    new_root-&amp;gt;depth = getDepth(new_root);
    new_root-&amp;gt;balance = getBalance(new_root);
}

void AVL::rightRotate(AVLNode *root) {
    if (!root || !root-&amp;gt;left)
        return;

    // 左孩子变成根节点
    AVLNode *new_root = root-&amp;gt;left;
    AVLNode *parent = root-&amp;gt;parent;
    new_root-&amp;gt;parent = parent;
    if (parent) {
        if (parent-&amp;gt;left == root)
            parent-&amp;gt;left = new_root;
        else
            parent-&amp;gt;right = new_root;
    } else {  // 整棵树都旋转了，根节点需要改变
        avl_root = new_root;
    }

    // 左孩子的右子树变成root的左子树
    root-&amp;gt;left = new_root-&amp;gt;right;
    if (new_root-&amp;gt;right)
        new_root-&amp;gt;right-&amp;gt;parent = root;

    // root成为其左孩子(原来)的右子树
    new_root-&amp;gt;right = root;
    root-&amp;gt;parent = new_root;

    // 更新深度信息
    root-&amp;gt;depth = getDepth(root);
    root-&amp;gt;balance = getBalance(root);
    new_root-&amp;gt;depth = getDepth(new_root);
    new_root-&amp;gt;balance = getBalance(new_root);
}

AVLNode *AVL::search(int data) {
    AVLNode *p = avl_root;
    while (p &amp;amp;&amp;amp; p-&amp;gt;value != data) {
        if (data &amp;lt; p-&amp;gt;value)
            p = p-&amp;gt;left;
        else
            p = p-&amp;gt;right;
    }
    return p;
}

void AVL::insert(int data) {
    if (!avl_root) {
        avl_root = new AVLNode(data);
        return;
    }

    AVLNode *p = avl_root;
    while (true) {
        // 如果data在平衡二叉树中已经存在则什么也不做，
        // 实际应用时如果是key-value的类型可以更新value
        if (p-&amp;gt;value == data) {
            return;
        } else if (data &amp;lt; p-&amp;gt;value) {   // 插入到左子树中
            if (p-&amp;gt;left) {
                p = p-&amp;gt;left;
            } else {
                p-&amp;gt;left = new AVLNode(data);
                p-&amp;gt;left-&amp;gt;parent = p;
                break;
            }
        } else {  // 插入到右子树中
            if (p-&amp;gt;right) {
                p = p-&amp;gt;right;
            } else {
                p-&amp;gt;right = new AVLNode(data);
                p-&amp;gt;right-&amp;gt;parent = p;
                break;
            }
        }
    }

    // 向上更新节点深度和平衡因子
    while (p) {
        int depth_record = p-&amp;gt;depth;

        p-&amp;gt;balance = getBalance(p);
        if (p-&amp;gt;balance == -2) {   // 左旋
            if (p-&amp;gt;right-&amp;gt;balance == 1)
                rightRotate(p-&amp;gt;right);
            leftRotate(p);
        } else if (p-&amp;gt;balance == 2) {  // 右旋
            if (p-&amp;gt;left-&amp;gt;balance == -1)
                leftRotate(p-&amp;gt;left);
            rightRotate(p);
        }

        // 如果p的深度不变，则p的祖先节点的深度和平衡因子都不变，无需继续回溯
        p-&amp;gt;depth = getDepth(p);
        if (depth_record == p-&amp;gt;depth)
            return;

        p = p-&amp;gt;parent;
    }
}

        node-&amp;gt;value = replace_node-&amp;gt;value;   // 非内置类型可能需要移动语义
        node = replace_node;
    }

    // 如果node只有左孩子或者只有右孩子或者没有孩子
    if (!node-&amp;gt;left &amp;amp;&amp;amp; !node-&amp;gt;right) {  // 叶子节点
        if (!parent) {  // 根节点
            avl_root = nullptr;
        } else {        // 非根节点
            if (node == parent-&amp;gt;left)

            else

        }
    } else if (node-&amp;gt;left &amp;amp;&amp;amp; !node-&amp;gt;right) {  // 只有左孩子
        if (!parent) {  // 根节点
            avl_root = node-&amp;gt;left;

void AVL::erase(int data) {
    AVLNode *node = search(data);

}

&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=&#34;katex-html&#34; aria-hidden=&#34;true&#34;&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:3.025449em;vertical-align:-1.267113em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mop op-limits&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:1.7583360000000003em;&#34;&gt;&lt;span style=&#34;top:-1.882887em;margin-left:0em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3.05em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;n&lt;/span&gt;&lt;span class=&#34;mrel mtight&#34;&gt;=&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;1&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.050005em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3.05em;&#34;&gt;&lt;/span&gt;&lt;span&gt;&lt;span class=&#34;mop op-symbol large-op&#34;&gt;∑&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-4.300005em;margin-left:0em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3.05em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;+&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;∞&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:1.267113em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.16666666666666666em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mopen nulldelimiter&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mfrac&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:1.32144em;&#34;&gt;&lt;span style=&#34;top:-2.314em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34;&gt;n&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.740108em;&#34;&gt;&lt;span style=&#34;top:-2.9890000000000003em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.23em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;frac-line&#34; style=&#34;border-bottom-width:0.04em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.677em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord&#34;&gt;1&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.686em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mclose nulldelimiter&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2777777777777778em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mrel&#34;&gt;=&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2777777777777778em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:2.177108em;vertical-align:-0.686em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mopen nulldelimiter&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mfrac&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:1.491108em;&#34;&gt;&lt;span style=&#34;top:-2.314em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord&#34;&gt;6&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.23em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;frac-line&#34; style=&#34;border-bottom-width:0.04em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.677em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.03588em;&#34;&gt;π&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.8141079999999999em;&#34;&gt;&lt;span style=&#34;top:-3.063em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.686em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mclose nulldelimiter&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;
">公式测试</a>
      </div>
      
      <div class="item">
        <a class="result-title" style="opacity: 0;" href="https://w-jin.github.io/post/cuda-driver-api-de-shi-yong/"" data-c="
          &lt;p&gt;不同于平时使用的runtime api，driver api更底层，使用方式与opencl差不多，编程的主要过程为创建上下文、传输数据、加载内核映像、读取内核函数并执行、拷贝结果等。&lt;/p&gt;
&lt;!-- more --&gt;
&lt;h2 id=&#34;头文件和库&#34;&gt;头文件和库&lt;/h2&gt;
&lt;p&gt;需要包含头文件：&lt;code&gt;#include &amp;lt;cuda.h&amp;gt;&lt;/code&gt;&lt;/p&gt;
&lt;p&gt;在linux上编译：&lt;code&gt;g++ main.cpp -lcuda&lt;/code&gt;&lt;/p&gt;
&lt;p&gt;在windows上编译：&lt;code&gt;cl main.cpp -link &amp;quot;C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v10.1\lib\x64\cuda.lib&amp;quot;&lt;/code&gt;&lt;/p&gt;
&lt;h2 id=&#34;创建上下文&#34;&gt;创建上下文&lt;/h2&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;cuInit(0);
int device_count = 0;
cuDeviceGetCount(&amp;amp;device_count);
if (0 == device_count) {
    std::cerr &amp;lt;&amp;lt; &amp;quot;无可用cuda设备!&amp;quot; &amp;lt;&amp;lt; std::endl;
    return -1;
}
CUdevice device;
cuDeviceGet(&amp;amp;device, 0);
CUcontext context;
cuCtxCreate(&amp;amp;context, 0, device);

// 其它依赖上下文的操作

cuCtxDestroy(context);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这样的创建方式可以为一个GPU指定多个上下文，也可以由&lt;code&gt;cuDevicePrimaryCtxRetain&lt;/code&gt;来获得GPU上唯一的主要上下文，这样可以更好的与runtime api或者其它cuda库合作：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;CUcontext context;
cuDevicePrimaryCtxRetain(&amp;amp;context, device);
cuCtxPushCurrent(context);

// 其它依赖上下文的操作

cuCtxPopCurrent(&amp;amp;context);
cuDevicePrimaryRelease(device);
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;数据传输&#34;&gt;数据传输&lt;/h2&gt;
&lt;p&gt;driver api的数据传输接口与runtime api十分类似，但driver api中指向显存的指针有自己的类型&lt;code&gt;CUdeviceptr&lt;/code&gt;，从&lt;code&gt;cuda.h&lt;/code&gt;中的定义来看，它应该是&lt;code&gt;unsigned long long&lt;/code&gt;类型。分配内存和传输数据的过程如下：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 显存指针
CUdeviceptr d_A = 0;
CUdeviceptr d_B = 0;
CUdeviceptr d_C = 0;

// 分配内存
cuMemAlloc(&amp;amp;d_A, size);
cuMemAlloc(&amp;amp;d_B, size);
cuMemAlloc(&amp;amp;d_C, size);

// 复制数据
cuMemcpyHtoD(d_A, h_A, size);
cuMemcpyHtoD(d_B, h_B, size);

/* 执行内核 */

// 取回结果
cuMemcpyDtoH(h_C, d_C, size);

// 释放内存
cuMemFree(d_A);
cuMemFree(d_B);
cuMemFree(d_C);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;其中，&lt;code&gt;h_A&lt;/code&gt;和&lt;code&gt;h_B&lt;/code&gt;是指向内存的指针，&lt;code&gt;size&lt;/code&gt;为需要复制的字节数，可由&lt;code&gt;unsigned long size = N * sizeof(double or float)&lt;/code&gt;给出，&lt;code&gt;N&lt;/code&gt;是数据个数。&lt;/p&gt;
&lt;h2 id=&#34;执行内核代码&#34;&gt;执行内核代码&lt;/h2&gt;
&lt;p&gt;内核代码应该事先编译成ptx代码。ptx(Parallel Thread eXecution)代码是编译后的GPU代码的一种中间形式，它可以再次编译为原生的GPU微码(cubin)。&lt;/p&gt;
&lt;p&gt;从cuda程序的编译流程可以知道，runtime api写出来的程序需要分离成设备代码与主机代码，使用不同的编译器进行编译。但是使用driver api时，主机代码与设备代码是完全分开的，只需要分别使用nvcc和c++编译器编译即可。&lt;/p&gt;
&lt;p&gt;生成ptx代码的方式为&lt;br&gt;
命令行：&lt;code&gt;nvcc -ptx kernel.cu -arch compute_50 //-Xcompiler -wd4819&lt;/code&gt;&lt;br&gt;
cmake：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;add_library(kernel OBJECT kernel.cu)
set_property(TARGET kernel PROPERTY CUDA_PTX_COMPILATION ON)
install(TARGETS kernel OBJECTS DESTINATION ptx)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在执行&lt;code&gt;cmake install&lt;/code&gt;之前，生成的ptx代码位于&lt;code&gt;build/CMakeFiles/kernel.dir/kernel.ptx&lt;/code&gt;里。&lt;/p&gt;
&lt;p&gt;在主机代码中调用核函数显然不可能再交给nvcc处理，因此只能只能通过相应的接口将ptx代码加载进来并发射到GPU上：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;CUmodule module;
cuModuleLoad(&amp;amp;module, &amp;quot;kernel.ptx&amp;quot;);
CUfunction vector_add;
cuModuleGetFunction(&amp;amp;vector_add, module, &amp;quot;AddKernel&amp;quot;);

// 启动kernel
int threads_per_block = 1024;
unsigned long blocks_per_grid = (N + threads_per_block - 1) /  threads_per_block;
void *args[] = {&amp;amp;d_A, &amp;amp;d_B, &amp;amp;d_C, &amp;amp;N};
cuLaunchKernel(vector_add,
        blocks_per_grid, 1, 1,
        threads_per_block, 1, 1,
        0, nullptr, args, nullptr);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这样的加载方式是即时编译的，拥有较好的兼容性，只要真实架构大代不低于指定的虚拟架构，都能为它生成代码。如果目标GPU在编码时就已经确定，还可以直接编译成二进制GPU代码，以获得更好的性能。&lt;/p&gt;
&lt;p&gt;编译成二进制GPU代码的命令为：&lt;code&gt;nvcc -cubin kernel.cu -arch=compute_50 -code=sm_50 //-Xcompiler -wd4819&lt;/code&gt;或者生成多个目标GPU的二进制代码：&lt;code&gt;nvcc -cubin kernel.cu -gencode arch=compute_50,code=sm_50 -gencode arch=compute_61,code=61 //-Xcompiler -wd4819&lt;/code&gt;。&lt;/p&gt;
&lt;p&gt;二进制代码的加载方式 与ptx代码的加载方式一样：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;CUmodule module;
cuModuleLoad(&amp;amp;module, &amp;quot;kernel.cubin&amp;quot;);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;但是需要注意，&lt;code&gt;kernel.cubin&lt;/code&gt;的真实架构必须和运行程序的GPU一致，同时，否则将引起错误：&lt;code&gt;device kernel image is invalid&lt;/code&gt;。&lt;/p&gt;
&lt;p&gt;内核的执行需要设置块数、块内线程数、参数以及共享内存，主要接口为&lt;code&gt;cuLauchKernel&lt;/code&gt;，完整的接口声明如下：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;CUresult cuLaunchKernel(CUfunction f,
		unsigned int  gridDimX, unsigned int  gridDimY, unsigned int  gridDimZ,
		unsigned int  blockDimX, unsigned int  blockDimY, unsigned int  blockDimZ,
		unsigned int  sharedMemBytes, CUstream hStream,
		void **kernelParams, void **extra)；
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在&lt;code&gt;gridDimX&lt;/code&gt; &lt;span class=&#34;katex&#34;&gt;&lt;span class=&#34;katex-mathml&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mo&gt;×&lt;/mo&gt;&lt;/mrow&gt;&lt;annotation encoding=&#34;application/x-tex&#34;&gt;\times&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=&#34;katex-html&#34; aria-hidden=&#34;true&#34;&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:0.66666em;vertical-align:-0.08333em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;×&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt; &lt;code&gt;gridDimY&lt;/code&gt; &lt;span class=&#34;katex&#34;&gt;&lt;span class=&#34;katex-mathml&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mo&gt;×&lt;/mo&gt;&lt;/mrow&gt;&lt;annotation encoding=&#34;application/x-tex&#34;&gt;\times&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=&#34;katex-html&#34; aria-hidden=&#34;true&#34;&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:0.66666em;vertical-align:-0.08333em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;×&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt; &lt;code&gt;gridDimZ&lt;/code&gt;网格块上调用内核&lt;code&gt;f&lt;/code&gt;，每个块包含&lt;code&gt;blockDimX&lt;/code&gt; &lt;span class=&#34;katex&#34;&gt;&lt;span class=&#34;katex-mathml&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mo&gt;×&lt;/mo&gt;&lt;/mrow&gt;&lt;annotation encoding=&#34;application/x-tex&#34;&gt;\times&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=&#34;katex-html&#34; aria-hidden=&#34;true&#34;&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:0.66666em;vertical-align:-0.08333em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;×&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt; &lt;code&gt;blockDimY&lt;/code&gt; &lt;span class=&#34;katex&#34;&gt;&lt;span class=&#34;katex-mathml&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mo&gt;×&lt;/mo&gt;&lt;/mrow&gt;&lt;annotation encoding=&#34;application/x-tex&#34;&gt;\times&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=&#34;katex-html&#34; aria-hidden=&#34;true&#34;&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:0.66666em;vertical-align:-0.08333em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;×&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt; &lt;code&gt;blockDimZ&lt;/code&gt;线程。&lt;code&gt;sharedMemBytes&lt;/code&gt;设置每个线程块可用的动态共享内存量。&lt;/p&gt;
&lt;p&gt;&lt;code&gt;f的&lt;/code&gt;内核参数可以用以下两种方式之一指定：&lt;/p&gt;
&lt;p&gt;(1）可以通过&lt;code&gt;kernelParams&lt;/code&gt;指定内核参数。如果&lt;code&gt;f&lt;/code&gt;有N个参数，那么&lt;code&gt;kernelParams&lt;/code&gt;需要是N个指针的数组。 &lt;code&gt;kernelParams[0]&lt;/code&gt;到&lt;code&gt;kernelParams[N-1]&lt;/code&gt;中的每一个都必须指向将从中复制实际内核参数的内存区域。不需要指定内核参数的数量及其偏移量和大小，因为直接从内核的映像中检索该信息。&lt;/p&gt;
&lt;p&gt;(2）内核参数也可以打包到单个缓冲区中，通过&lt;code&gt;extra&lt;/code&gt;参数传入。这需要知道每个内核参数的大小和它们在缓冲区内的对齐/填充信息。&lt;/p&gt;
&lt;p&gt;注意：必须使用3.2及以上的工具链编译内核代码，使其包含内核参数信息，如果没有内核参数，则&lt;code&gt;cuLaunchKernel&lt;/code&gt;将返回&lt;code&gt;CUDA_ERROR_INVALID_IMAGE&lt;/code&gt;。&lt;/p&gt;
&lt;h2 id=&#34;编写内核&#34;&gt;编写内核&lt;/h2&gt;
&lt;p&gt;内核函数必须放在独立的文件中，后缀名为&lt;code&gt;.cu&lt;/code&gt;，写法与使用runtime api一般无二，向量加法的一个示例为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;#include &amp;lt;device_launch_parameters.h&amp;gt;
extern &amp;quot;C&amp;quot; __global__ void AddKernel(double *A, double *B, double *C) {
    unsigned int i = blockDim.x * blockIdx.x + threadIdx.x;
    if (i &amp;lt; N)
        C[i] = A[i] + B[i];
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;注意：&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;头文件可以不包含，编译出来的ptx文件中没有对头文件的处理，即无论有没有第一行编译出来的ptx文件完全一样。但是包含头文件可以让编辑器更好的工作。&lt;/li&gt;
&lt;li&gt;extern &amp;quot;C&amp;quot;不能省略，否则编译出的代码中函数名字不正确，以上面的代码为例子，如果不加extern &amp;quot;C&amp;quot;，编译出来的代码中函数名字为&lt;code&gt;_Z9AddKernelPKdS0_Pdi&lt;/code&gt;。&lt;/li&gt;
&lt;/ol&gt;
&lt;h2 id=&#34;错误处理&#34;&gt;错误处理&lt;/h2&gt;
&lt;p&gt;错误处理的两个主要API为：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;// 获取错误代码枚举名称的字符串表示形式.
CUresult cuGetErrorName( CUresult error, const char** pStr );
// 获取错误代码的字符串描述.
CUresult cuGetErrorString( CUresult error, const char** pStr );
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;可以把它们包装成一个宏，在出错时予以提示：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;#define DEBUG
#ifndef DEBUG
#define CheckError(call) do { call; } while(0)
#else
#define CheckError(call) do {\
    const CUresult status = call;\
    if (status != CUDA_SUCCESS) {\
        const char *error_string = nullptr;\
        cuGetErrorString(status, &amp;amp;error_string);\
        std::cerr &amp;lt;&amp;lt; &amp;quot;于文件&amp;quot; &amp;lt;&amp;lt; __FILE__ &amp;lt;&amp;lt; &amp;quot;第&amp;quot; &amp;lt;&amp;lt; __LINE__ &amp;lt;&amp;lt; &amp;quot;行发生错误！\n&amp;quot;;\
        std::cerr &amp;lt;&amp;lt; error_string &amp;lt;&amp;lt; std::endl;\
        exit(-1);\
    }\
} while (0)
#endif
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;使用方式为&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-cpp&#34;&gt;CheckError(cuModuleLoad(&amp;amp;module, &amp;quot;kernel.ptx&amp;quot;));
&lt;/code&gt;&lt;/pre&gt;

<script>
  !function () {
    let searchMask = document.querySelector('#search_mask');
    let result = document.querySelector('#result');
    let items = document.querySelectorAll('.item');
    let searchBox = document.querySelector('#search');
    let statCount = document.querySelector('#stat_count');
    let statTimes = document.querySelector('#stat_times');
    let pageUl = document.querySelector('#page_ul');
    let close = document.querySelector('#close');
    
    close.addEventListener('click', function() {
      searchMask.style = 'display: none;'
    })

    let finds = [];
    let contents = [];
    let pageSize = 10;
    items.forEach(item => {
      let a = item.querySelector('a');
      contents.push({
        title: a.innerText,
        details: a.dataset.c,
        link: a.href
      })
      item.remove();
    })

    function insertStr(soure, start, count) {
      let newStr = soure.substr(start, count);
      return soure.slice(0, start) + '<em>' + newStr + '</em>' + soure.slice(start + count);
    }

    pageUl.addEventListener('click', function(event) {
      let target = event.target;
      if (target.__proto__ === HTMLSpanElement.prototype) {
        appendResults(parseInt(target.dataset.i));
      }
    })

    function appendResults(index) {
      let htmlResult = '';
      let start = index || 0;
      let end = Math.min(start + pageSize, finds.length);
      for (let i = start; i < end; i++) {
        const current = finds[i];
        let html = current.title;
        let sum = 0;
        let positions = current.positions;
        positions.forEach(position => {
          html = insertStr(html, position.start + sum, position.count);
          sum += 9;
        })
        htmlResult += `<div class="item"><a class="result-title" href="${current.link}">${html}</a></div>`;
      }
      result.innerHTML = htmlResult;
      pageUl.innerHTML = '';
      let count = finds.length / pageSize;
      let lis = '';
      if (start !== 0) {
        lis += `<span class="fa fa-angle-left" data-i='${start - 1}'></span>`;
      }
      for (let i = 0; i < count; i++) {
        lis += `<span class='${i === start?'current':''}' data-i='${i}'>${i+1}</span>`;     
      }
      if (start+1 < count) {
        lis += `<span class="fa fa-angle-right" data-i='${start+1}'></span>`;  
      }
      pageUl.innerHTML = lis;
    }

    function search(delay) {
      let timer = null
      return function () {
        clearTimeout(timer)
        timer = setTimeout(() => {
          let start = Date.now();
          let segments = searchBox.value.split(' ').filter(c => c != '');
          if (segments.length <= 0) {
            return;
          }
          finds = [];
          let htmlResult = '';
          contents.forEach(content => {
            let title = content.title;
            let positions = [];
            let find = false;
            segments.forEach((segment) => {
              if (content.title.includes(segment)) {
                find = true;
                positions.push({
                  start: content.title.indexOf(segment),
                  count: segment.length
                })
              } else if (content.details.includes(segment)) {
                find = true;
              }
            });
            if (find) {
              finds.push({
                title: content.title,
                link: content.link,
                positions
              });
            }
          })
          appendResults(0);
          statCount.textContent = finds.length;
          statTimes.textContent = Date.now() - start;
        }, delay)
      }
    }
    searchBox.addEventListener('input', search(200));
  }()
</script>

  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  })

</script>
